name: "Odysseus Lite"
description: "Experimental Home Assistant add-on for the Odysseus self-hosted AI workspace."
version: "0.3.36"
slug: "odysseus_lite"
url: "https://github.com/pewdiepie-archdaemon/odysseus"
arch:
  - amd64
startup: services
boot: manual
stage: experimental
init: false
ports:
  7000/tcp: 7000
ports_description:
  7000/tcp: "Odysseus web UI"
webui: "http://[HOST]:[PORT:7000]"
watchdog: "http://[HOST]:[PORT:7000]/api/health"
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:robot
panel_title: Odysseus
map:
  - type: share
    read_only: false
  - type: ssl
options:
  auth_enabled: true
  admin_user: "admin"
  reset_admin_password_on_start: false
  allowed_origins: "http://192.168.0.127:7000,http://homeassistant.local:7000,http://localhost:7000,http://127.0.0.1:7000"
  llm_host: "192.168.0.127"
  auto_configure_ollama: true
  ollama_base_url: "http://192.168.0.127:11434"
  ollama_model: "qwen2.5-coder:7b"
  chromadb_port: 8000
  fastembed_model: "sentence-transformers/all-MiniLM-L6-v2"
  chat_upload_max_mb: 10
  llm_default_timeout_seconds: 120
  llm_stream_timeout_seconds: 600
  workspace_dir: "/share/odysseus-workspace"
  tools_dir: "/share/odysseus-tools"
  small_model_agent_workarounds: true
  small_model_max_parameters_b: 8
  run_workspace_bootstrap: false
  workspace_bootstrap_script: "/share/odysseus-workspace/bootstrap.sh"
schema:
  auth_enabled: bool
  admin_user: str
  admin_password: password?
  reset_admin_password_on_start: bool
  allowed_origins: str
  llm_host: str
  auto_configure_ollama: bool
  llm_hosts: str?
  ollama_base_url: str
  ollama_model: str
  openai_api_key: password?
  searxng_instance: str?
  chromadb_host: str?
  chromadb_port: int
  fastembed_model: str
  chat_upload_max_mb: "int(1,500)"
  llm_default_timeout_seconds: "int(30,1800)"
  llm_stream_timeout_seconds: "int(60,3600)"
  workspace_dir: str
  tools_dir: str
  small_model_agent_workarounds: bool
  small_model_max_parameters_b: "int(1,70)"
  run_workspace_bootstrap: bool
  workspace_bootstrap_script: str
